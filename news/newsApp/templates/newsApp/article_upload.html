{% extends "newsApp/base.html" %}
{% block content %}
<h2>Upload Article</h2>
<div class="container mt-4">

    <h2>Upload Article</h2>

    <form method="POST" enctype="multipart/form-data">

        {% csrf_token %}

        {{ form.media }}

        {{ form.as_p }}

        <button type="submit" class="btn btn-primary">
            Upload
        </button>

    </form>

</div>
{% endblock %}
