{% block content %}

<div class="container mt-4">

    {% with article=lead_articles.0 %}
        {% if article %}

            {% if article.image %}
                <img src="{{ article.image.url }}"
                     alt="{{ article.title }}"
                     class="img-fluid">
            {% endif %}

            <h2>
                <a href="{% url 'article_detail' article.slug %}">
                    {{ article.title }}
                </a>
            </h2>

        {% else %}
            <p>No lead article available</p>
        {% endif %}
    {% endwith %}

</div>

{% endblock %}
